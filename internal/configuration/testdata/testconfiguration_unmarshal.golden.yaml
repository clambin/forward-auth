server:
  addr: :8080
  cookieName: forward-auth-session
  domain: ""
logger:
  level: info
  format: text
prometheus:
  addr: :9120
  path: /metrics
storage:
  type: redis
  redis:
    addr: localhost:6379
    username: my-user
    password: my-password
    db: 10
authz:
  rules:
  - domain: "*.example.com"
    groups:
    - users
  groups:
  - name: users
    users:
    - foo@example.com
authn:
  provider:
    type: oidc
    redirect_url: https://auth.example.com/api/auth/login
    oidc:
      issuer_url: https://auth.example.com/oidc
      client_id: "1234"
      client_secret: "5678"
      scopes:
      - openid
      - email
      - profile
    github:
      client_id: ""
      client_secret: ""
      scopes:
      - user:email
      - read:user
  state_ttl: 10m0s
  select_account: false
session:
  session_ttl: 24h0m0s
